<svg viewBox="0 0 640 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Portrait placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1a"/>
      <stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e0ff"/>
      <stop offset="0.55" stop-color="#4d7cff"/>
      <stop offset="1" stop-color="#7a5cff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#00e0ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#00e0ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="round"><rect x="0" y="0" width="640" height="800" rx="24"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="640" height="800" fill="url(#bg)"/>
    <!-- grid -->
    <g stroke="#00e0ff" stroke-opacity="0.06">
      <path d="M0 100H640M0 200H640M0 300H640M0 400H640M0 500H640M0 600H640M0 700H640"/>
      <path d="M100 0V800M200 0V800M300 0V800M400 0V800M500 0V800"/>
    </g>
    <rect width="640" height="800" fill="url(#glow)"/>

    <!-- avatar disc -->
    <circle cx="320" cy="330" r="150" fill="none" stroke="url(#neon)" stroke-width="2" stroke-opacity="0.55"/>
    <circle cx="320" cy="330" r="128" fill="#0b1220"/>
    <!-- person silhouette -->
    <g fill="url(#neon)">
      <circle cx="320" cy="300" r="52"/>
      <path d="M232 452c0-52 40-92 88-92s88 40 88 92v6H232z"/>
    </g>

    <!-- code motif -->
    <g fill="none" stroke="url(#neon)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.85">
      <path d="M196 560l-40 40 40 40"/>
      <path d="M444 560l40 40-40 40"/>
      <path d="M300 552l40 96"/>
    </g>

    <!-- corner ticks -->
    <g stroke="url(#neon)" stroke-width="3" stroke-opacity="0.7">
      <path d="M40 70V40H70" fill="none"/>
      <path d="M600 70V40H570" fill="none"/>
      <path d="M40 730V760H70" fill="none"/>
      <path d="M600 730V760H570" fill="none"/>
    </g>

    <text x="320" y="712" text-anchor="middle" fill="#8791a6" font-family="monospace" font-size="22" letter-spacing="4">// YOUR PHOTO HERE</text>
  </g>
</svg>
